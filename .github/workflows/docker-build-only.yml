name: Build Docker Images (PR Check)

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: false
          load: true
          tags: ghcr.io/revnix/evalyn-backend:pr

      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: false
          load: true
          tags: ghcr.io/revnix/evalyn-frontend:pr
